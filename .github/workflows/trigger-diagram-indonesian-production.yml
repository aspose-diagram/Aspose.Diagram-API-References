name: Trigger Diagram Indonesian Production Build

on:
  push:
    branches: [ production ]
    paths: [ 'indonesian/**' ]
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.REPO_TOKEN }}
          repository: Aspose/apireference.aspose.com
          event-type: build-diagram-indonesian-production
